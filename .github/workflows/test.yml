name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'TODO.md'
  pull_request:
    paths-ignore:
      - 'TODO.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: |
          TARGET=$(find . -maxdepth 2 -name '*.sln' | head -1)
          echo "Restoring ${TARGET:-.}"
          dotnet restore "${TARGET:-.}"

      - name: Build
        run: |
          TARGET=$(find . -maxdepth 2 -name '*.sln' | head -1)
          echo "Building ${TARGET:-.}"
          dotnet build "${TARGET:-.}" --no-restore --configuration Release

      - name: Test (only if a test project exists)
        run: |
          if find . -name '*.csproj' -print0 | xargs -0 grep -l -i 'Microsoft.NET.Test.Sdk' 2>/dev/null | grep -q .; then
            TARGET=$(find . -maxdepth 2 -name '*.sln' | head -1)
            echo "Test project detected — running dotnet test on ${TARGET:-.}"
            dotnet test "${TARGET:-.}" --configuration Release --verbosity normal
          else
            echo "No test project detected — build passed, skipping tests."
          fi